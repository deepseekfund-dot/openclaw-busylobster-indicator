<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusyLobster Indicator Test 🦞</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }

        /* 主容器 */
        #claw-busy-overlay {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 2px solid #FF6B6B;
            border-radius: 50px;
            padding: 12px 24px;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.25);
            z-index: 99999;
            display: none;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            transition: opacity 400ms cubic-bezier(0.4, 0, 0.2, 1),
                        transform 400ms cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        #claw-busy-overlay.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* 龙虾 Emoji 动画 */
        .lobster-emoji {
            font-size: 32px;
            display: inline-block;
            animation: lobsterRun 0.6s ease-in-out infinite;
            transform-origin: center bottom;
        }

        @keyframes lobsterRun {
            0%, 100% {
                transform: translateY(0) rotate(-5deg) scaleX(1);
            }
            25% {
                transform: translateY(-6px) rotate(5deg) scaleX(-1);
            }
            50% {
                transform: translateY(0) rotate(-5deg) scaleX(-1);
            }
            75% {
                transform: translateY(-6px) rotate(5deg) scaleX(1);
            }
        }

        /* 闪电 Emoji 动画 */
        .bolt-emoji {
            font-size: 24px;
            display: inline-block;
            animation: boltPulse 0.4s ease-in-out infinite alternate;
        }

        @keyframes boltPulse {
            0% {
                transform: scale(1) rotate(-10deg);
                opacity: 0.7;
                filter: drop-shadow(0 0 2px #FFD93D);
            }
            100% {
                transform: scale(1.3) rotate(10deg);
                opacity: 1;
                filter: drop-shadow(0 0 8px #FFD93D);
            }
        }

        /* 文字样式 */
        .lobster-text {
            color: #333;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 4px;
            animation: textPulse 1.5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* 跑步尘土效果 */
        .dust-container {
            display: flex;
            gap: 2px;
            margin-left: -4px;
        }
        .dust-dot {
            width: 4px;
            height: 4px;
            background: #FFB4B4;
            border-radius: 50%;
            opacity: 0;
            animation: dustCloud 0.8s ease-out infinite;
        }
        .dust-dot:nth-child(1) { animation-delay: 0s; }
        .dust-dot:nth-child(2) { animation-delay: 0.2s; }
        .dust-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dustCloud {
            0% {
                opacity: 0;
                transform: translateX(0) scale(0.5);
            }
            50% {
                opacity: 0.8;
                transform: translateX(-8px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-16px) scale(0.3);
            }
        }

        /* 深色模式支持 */
        @media (prefers-color-scheme: dark) {
            #claw-busy-overlay {
                background: rgba(40, 40, 45, 0.95);
                border-color: #FF6B6B;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            }
            .lobster-text {
                color: #F5F5F5;
            }
            .dust-dot {
                background: #FF9999;
            }
        }

        /* 演示卡片 */
        .demo-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
        }
        .demo-card p {
            color: #666;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <h1>🦞 BusyLobster Indicator v2.0</h1>

    <div class="controls">
        <button class="btn-start" onclick="startTask()">▶ 模拟任务开始</button>
        <button class="btn-stop" onclick="endTask()">⏹ 模拟任务结束</button>
    </div>

    <div class="demo-card">
        <div style="font-size: 48px;">🦞⚡</div>
        <h2>纯 CSS + Emoji 动画</h2>
        <p>无 GIF 文件，无外部资源依赖</p>
        <p style="margin-top: 8px; color: #999; font-size: 12px;">
            点击「模拟任务开始」，1.5秒后动画会出现
        </p>
    </div>

    <div id="claw-busy-overlay">
        <div class="dust-container">
            <span class="dust-dot"></span>
            <span class="dust-dot"></span>
            <span class="dust-dot"></span>
        </div>
        <span class="lobster-emoji">🦞</span>
        <span class="bolt-emoji">⚡</span>
        <span class="lobster-text">龙虾君正在飞奔处理...</span>
    </div>

    <script>
        let timer = null;
        const ui = document.getElementById('claw-busy-overlay');

        function startTask() {
            console.log('Task started, waiting 1.5s...');
            timer = setTimeout(() => {
                ui.style.display = 'flex';
                requestAnimationFrame(() => {
                    ui.classList.add('visible');
                });
            }, 1500);
        }

        function endTask() {
            clearTimeout(timer);
            ui.classList.remove('visible');
            setTimeout(() => {
                if (!ui.classList.contains('visible')) {
                    ui.style.display = 'none';
                }
            }, 400);
        }
    </script>
</body>
</html>
